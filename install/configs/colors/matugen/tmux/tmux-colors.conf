# Matugen color definitions for tmux
# Saved to: ~/.cache/matugen/tmux-colors.conf

set -g @mat_bg "#121318"
set -g @mat_fg "#e3e2e9"
set -g @mat_surface "#121318"
set -g @mat_surface_container "#1e1f25"
set -g @mat_surface_variant "#45464f"
set -g @mat_primary "#b3c5ff"
set -g @mat_secondary "#c1c6dd"
set -g @mat_tertiary "#e2bbdc"
set -g @mat_error "#ffb4ab"
set -g @mat_on_primary "#1a2e60"
set -g @mat_on_secondary "#2a3042"
set -g @mat_on_surface "#e3e2e9"
set -g @mat_on_surface_variant "#c5c6d0"
set -g @mat_outline "#8f909a"
set -g @mat_outline_variant "#45464f"

set -g @overlay "#38393f"

set -g @text "#e3e2e9"

set -g @accent "#b3c5ff"
set -g @red "#93000a"

set -g @highlight_high "#38393f"

set -g @border "#c5c6d0"
